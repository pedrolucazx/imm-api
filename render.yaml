# Render deployment configuration — Infrastructure as Code
# autoDeploy: false em ambos os serviços — deploys são disparados via cd.yml (após CI)
services:
  - type: web
    name: imm-production
    runtime: node
    rootDir: .
    branch: main
    autoDeploy: false
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: imm-production.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
