name: CD — Deploy (Railway)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-api-railway
  cancel-in-progress: false

jobs:
  health-check:
    name: "Health check"
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.insidemymind.tech

    steps:
      - name: Wait for Railway deploy
        run: sleep 30

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            HEALTH=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 https://api.insidemymind.tech/health || echo "000")
            if [ "$HEALTH" = "200" ]; then
              echo "Health check passed (HTTP $HEALTH)"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $HEALTH), retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1
