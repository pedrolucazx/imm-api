name: CD — Deploy (Railway)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-api-railway
  cancel-in-progress: false

jobs:
  migrate:
    name: "Run migrations"
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.insidemymind.tech

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: npx drizzle-kit migrate

      - name: Verify migrations applied
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          SQL_COUNT=$(ls src/migrations/*.sql | wc -l | tr -d ' ')
          DB_COUNT=$(node -e "
            const postgres = require('./node_modules/postgres');
            const sql = postgres(process.env.DATABASE_URL, { ssl: 'require', max: 1 });
            sql\`SELECT COUNT(*)::int AS n FROM drizzle.__drizzle_migrations\`
              .then(r => { console.log(r[0].n); return sql.end(); })
              .catch(e => { console.error(e.message); process.exit(1); });
          ")
          echo "SQL files: $SQL_COUNT | DB migrations: $DB_COUNT"
          if [ "$SQL_COUNT" != "$DB_COUNT" ]; then
            echo "ERROR: $SQL_COUNT migration files but only $DB_COUNT applied in DB"
            exit 1
          fi
          echo "All $SQL_COUNT migrations applied"

      - name: Health check
        run: |
          sleep 15
          HEALTH=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 https://api.insidemymind.tech/health || echo "000")
          if [ "$HEALTH" = "200" ]; then
            echo "Health check passed (HTTP $HEALTH)"
          else
            echo "Health check failed (HTTP $HEALTH)"
            exit 1
          fi
